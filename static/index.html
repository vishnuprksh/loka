<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loka — The Grove</title>
  <style>
    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #30363d;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --green:    #3fb950;
      --yellow:   #d29922;
      --red:      #f85149;
      --blue:     #58a6ff;
      --purple:   #bc8cff;
      --orange:   #f0883e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.2rem; color: var(--green); letter-spacing: 1px; }
    #tick-display { color: var(--muted); font-size: 0.85rem; }
    #berry-display { color: var(--green); font-size: 0.85rem; margin-left: auto; }
    #gold-display { color: var(--yellow); font-size: 0.85rem; }
    #conn-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--red);
      transition: background 0.4s;
    }
    #conn-dot.live { background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── Main layout ── */
    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Grid panel ── */
    #panel-grid {
      padding: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      border-right: 1px solid var(--border);
      flex-shrink: 0;
      width: 640px;
    }
    #panel-grid .section-title {
      color: var(--muted);
      font-size: 0.7rem;
      letter-spacing: 3px;
      margin-bottom: 8px;
    }
    #worldCanvas {
      border: 1px solid var(--border);
      border-radius: 4px;
      display: block;
    }
    #legend {
      display: flex;
      gap: 14px;
      margin-top: 8px;
      font-size: 0.7rem;
      color: var(--muted);
      flex-wrap: wrap;
    }
    .legend-pill {
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.02);
    }

    /* ── Agents panel ── */
    #panel-agents {
      flex: 1;
      padding: 14px;
      overflow-y: auto;
      border-right: 1px solid var(--border);
      min-width: 240px;
    }
    .section-title {
      color: var(--muted);
      font-size: 0.7rem;
      letter-spacing: 3px;
      margin-bottom: 10px;
    }

    .agent-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 10px;
      transition: border-color .3s;
    }
    .agent-card:hover { border-color: var(--blue); }
    .agent-card.dead { opacity: .35; border-color: var(--red); }

    .agent-header {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .agent-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .agent-name { font-size: .95rem; font-weight: bold; }
    .agent-loc  { color: var(--muted); font-size: .7rem; margin-top: 2px; }

    .agent-thought {
      color: var(--purple);
      font-size: .7rem;
      font-style: italic;
      margin-top: 6px;
      border-left: 2px solid var(--purple);
      padding-left: 8px;
      min-height: 16px;
    }

    .stat-row { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .stat { display: flex; flex-direction: column; align-items: center; }
    .stat-label { font-size: .55rem; color: var(--muted); text-transform: uppercase; }
    .stat-bar {
      width: 60px; height: 5px;
      background: var(--border); border-radius: 3px;
      margin-top: 3px; overflow: hidden;
    }
    .stat-fill { height: 100%; border-radius: 3px; transition: width .5s; }
    .stat-fill.hunger    { background: var(--yellow); }
    .stat-fill.energy    { background: var(--green); }
    .stat-fill.community { background: var(--blue); }
    .stat-fill.money     { background: var(--orange); }
    .stat-num { font-size: .6rem; color: var(--muted); margin-top: 2px; }

    .trait-row { display: flex; gap: 5px; margin-top: 6px; flex-wrap: wrap; }
    .trait-badge {
      font-size: .6rem; color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1px 7px;
    }
    .inv-badge {
      font-size: .6rem; color: var(--green);
      background: var(--bg);
      border: 1px solid var(--green);
      border-radius: 10px;
      padding: 1px 7px;
      margin-top: 4px;
      display: inline-block;
    }
    .money-badge {
      font-size: .6rem;
      color: var(--yellow);
      background: rgba(240, 136, 62, 0.12);
      border: 1px solid rgba(240, 136, 62, 0.7);
      border-radius: 10px;
      padding: 1px 7px;
      margin-top: 4px;
      display: inline-block;
    }
    .c-entry.pay,
    .c-entry.trade {
      color: #ffd38a;
    }
    .c-entry.pay .c-tick,
    .c-entry.trade .c-tick {
      color: var(--orange);
    }

    /* ── Right column ── */
    #panel-right {
      width: 300px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Chronicle */
    #panel-chronicle {
      flex: 1;
      padding: 14px;
      display: flex;
      flex-direction: column;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }
    #chronicle-log {
      flex: 1;
      overflow-y: auto;
      font-size: .7rem;
    }
    .c-entry {
      padding: 3px 0;
      border-bottom: 1px solid #1c2128;
      color: var(--muted);
      line-height: 1.4;
    }
    .c-tick { color: var(--green); margin-right: 5px; }

    /* Create panel */
    #panel-create {
      padding: 14px;
      flex-shrink: 0;
    }

    .form-row { margin-bottom: 8px; }
    .form-row label {
      display: block;
      font-size: .7rem;
      color: var(--muted);
      margin-bottom: 3px;
    }
    .form-row input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      padding: 5px 9px;
      font-family: inherit;
      font-size: .82rem;
    }
    .form-row input[type="text"]:focus {
      outline: none;
      border-color: var(--blue);
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }
    .slider-row label {
      font-size: .65rem;
      color: var(--muted);
      width: 78px;
      flex-shrink: 0;
    }
    input[type="range"] { flex: 1; accent-color: var(--blue); }
    .slider-val { font-size: .7rem; color: var(--green); width: 28px; text-align: right; }

    #createBtn {
      width: 100%;
      background: var(--green);
      color: var(--bg);
      border: none;
      border-radius: 4px;
      padding: 7px;
      font-family: inherit;
      font-size: .82rem;
      font-weight: bold;
      cursor: pointer;
      transition: opacity .2s;
      margin-top: 4px;
    }
    #createBtn:hover   { opacity: .82; }
    #createBtn:disabled { opacity: .4; cursor: not-allowed; }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track  { background: var(--bg); }
    ::-webkit-scrollbar-thumb  { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<header>
  <div id="conn-dot"></div>
  <h1>⧭ LOKA — The Grove</h1>
  <span id="tick-display">Tick: 0</span>
  <span id="berry-display">🫐 20</span>
  <span id="gold-display">💰 0</span>
</header>

<main>

  <!-- Grid -->
  <div id="panel-grid">
    <div class="section-title">THE GROVE</div>
    <canvas id="worldCanvas"></canvas>
    <div id="legend">
      <span class="legend-pill">🔥 Fire Pit</span>
      <span class="legend-pill">🫐 Berries</span>
      <span class="legend-pill">🛖 Shelter</span>
      <span class="legend-pill">💰 Gold powers trade</span>
    </div>
  </div>

  <!-- Agents -->
  <div id="panel-agents">
    <div class="section-title">AGENTS</div>
    <div id="agents-list"></div>
  </div>

  <!-- Right: chronicle + create -->
  <div id="panel-right">
    <div id="panel-chronicle">
      <div class="section-title">CHRONICLE</div>
      <div id="chronicle-log"></div>
    </div>

    <div id="panel-create">
      <div class="section-title">CREATE AGENT</div>
      <div class="form-row">
        <label>NAME</label>
        <input type="text" id="agentName" placeholder="Enter name…" maxlength="20" autocomplete="off" />
      </div>
      <div class="slider-row">
        <label>GREED</label>
        <input type="range" id="sliderGreed" min="0" max="100" value="50"
               oninput="updateVal('greed', this.value)" />
        <span class="slider-val" id="valGreed">0.5</span>
      </div>
      <div class="slider-row">
        <label>SOCIABILITY</label>
        <input type="range" id="sliderSocial" min="0" max="100" value="70"
               oninput="updateVal('social', this.value)" />
        <span class="slider-val" id="valSocial">0.7</span>
      </div>
      <div class="slider-row">
        <label>CURIOSITY</label>
        <input type="range" id="sliderCurio" min="0" max="100" value="50"
               oninput="updateVal('curio', this.value)" />
        <span class="slider-val" id="valCurio">0.5</span>
      </div>
      <div class="slider-row">
        <label>EMPATHY</label>
        <input type="range" id="sliderEmpathy" min="0" max="100" value="50"
               oninput="updateVal('empathy', this.value)" />
        <span class="slider-val" id="valEmpathy">0.5</span>
      </div>
      <div class="slider-row">
        <label>ASSERTIVE</label>
        <input type="range" id="sliderAssert" min="0" max="100" value="50"
               oninput="updateVal('assert', this.value)" />
        <span class="slider-val" id="valAssert">0.5</span>
      </div>
      <button id="createBtn" onclick="createAgent()">BIRTH AGENT</button>
      <button id="resetBtn" onclick="resetSimulation()" style="margin-top: 10px; background: #f85149; border-color: #f85149;">RESET ALL</button>
    </div>
  </div>

</main>

<script>
// ── Constants ──────────────────────────────────────────────────────
const GRID       = 20;
const CANVAS_SIZE = 600;
const CELL       = CANVAS_SIZE / GRID;

const LOC_POS = {
  fire_pit:   { x: 10, y: 10 },
  berry_bush: { x: 3,  y: 16 },
  shelter:    { x: 17, y: 3  },
};
const LOC_COLOR = {
  fire_pit:   '#f0883e',
  berry_bush: '#3fb950',
  shelter:    '#58a6ff',
};
const LOC_LABEL = {
  fire_pit:   '🔥',
  berry_bush: '🫐',
  shelter:    '🛖',
};
const AGENT_PALETTE = [
  '#58a6ff','#3fb950','#d29922','#bc8cff',
  '#f0883e','#79c0ff','#56d364','#ffa657',
];

// Active speech bubbles
let activeBubbles = [];

const canvas = document.getElementById('worldCanvas');
const ctx    = canvas.getContext('2d');
canvas.width  = CANVAS_SIZE;
canvas.height = CANVAS_SIZE;

let agentColors = {};
function agentColor(name) {
  if (!agentColors[name]) {
    const idx = Object.keys(agentColors).length % AGENT_PALETTE.length;
    agentColors[name] = AGENT_PALETTE[idx];
  }
  return agentColors[name];
}

// ── Canvas rendering ──────────────────────────────────────────────
function drawWorld(state) {
  ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

  // Background
  ctx.fillStyle = '#0a0e14';
  ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

  // Grid lines
  ctx.strokeStyle = '#161b22';
  ctx.lineWidth   = 0.5;
  for (let i = 0; i <= GRID; i++) {
    ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, CANVAS_SIZE); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i * CELL); ctx.lineTo(CANVAS_SIZE, i * CELL); ctx.stroke();
  }

  // Location glows + labels
  for (const [loc, pos] of Object.entries(LOC_POS)) {
    const cx = (pos.x + 0.5) * CELL;
    const cy = (pos.y + 0.5) * CELL;
    const col = LOC_COLOR[loc];

    // Radial glow
    const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, CELL * 2.2);
    grd.addColorStop(0, col + '55');
    grd.addColorStop(1, 'transparent');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(cx, cy, CELL * 2.2, 0, Math.PI * 2);
    ctx.fill();

    // Emoji
    ctx.font = `${CELL * 0.85}px serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(LOC_LABEL[loc], cx, cy);
  }

  // Agents grouped by location
  const groups = {};
  for (const a of state.agents.filter(a => a.alive)) {
    (groups[a.location] = groups[a.location] || []).push(a);
  }

  for (const [loc, list] of Object.entries(groups)) {
    const pos = LOC_POS[loc];
    if (!pos) continue;

    list.forEach((agent, idx) => {
      const col  = idx % 3;
      const row  = Math.floor(idx / 3);
      // Offset agents to sit beside their location icon
      const ax   = (pos.x - 2.2 + col * 1.3 + 0.65) * CELL;
      const ay   = (pos.y - 1.8 + row * 1.4 + 0.65) * CELL;
      const r    = CELL * 0.38;
      const color = agentColor(agent.name);

      // Circle fill
      ctx.beginPath();
      ctx.arc(ax, ay, r, 0, Math.PI * 2);
      ctx.fillStyle = color + 'bb';
      ctx.fill();
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Hunger warning ring
      if (agent.hunger <= 3) {
        ctx.beginPath();
        ctx.arc(ax, ay, r + 3, 0, Math.PI * 2);
        ctx.strokeStyle = '#f85149';
        ctx.lineWidth = 1.2;
        ctx.stroke();
      }

      // Initial letter
      ctx.font = `bold ${CELL * 0.45}px monospace`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#fff';
      ctx.fillText(agent.name[0].toUpperCase(), ax, ay);

      // Name tag below
      ctx.font = `${CELL * 0.28}px monospace`;
      ctx.fillStyle = color;
      ctx.fillText(agent.name.slice(0, 5), ax, ay + r + 10);
      
      // Render speech bubble if active
      const bubble = activeBubbles.find(b => b.name === agent.name);
      if (bubble && bubble.ticks > 0) {
        drawSpeechBubble(ax, ay - r - 10, bubble.msg, bubble.ticks);
      }
    });
  }
}

function drawSpeechBubble(x, y, text, ticks) {
  const alpha = Math.min(1, ticks / 5); // Fade out last 5 ticks
  ctx.save();
  ctx.globalAlpha = alpha;
  
  const padding = 6;
  const fontSize = 9;
  ctx.font = `${fontSize}px monospace`;
  
  // Wrap/truncate text
  const maxWidth = 220;
  const metrics = ctx.measureText(text);
  let displayContent = text;
  if (metrics.width > maxWidth) {
     displayContent = text.slice(0, 45) + "...";
  }
  
  const w = Math.min(maxWidth + padding * 2, ctx.measureText(displayContent).width + padding * 2);
  const h = fontSize + padding * 2;
  const bx = x - w / 2;
  const by = y - h - 10;
  
  // Rounded bubble background
  ctx.fillStyle = "rgba(22, 27, 34, 0.95)";
  ctx.strokeStyle = "#58a6ff";
  ctx.lineWidth = 1;
  
  const r = 4;
  ctx.beginPath();
  ctx.moveTo(bx + r, by);
  ctx.lineTo(bx + w - r, by);
  ctx.quadraticCurveTo(bx + w, by, bx + w, by + r);
  ctx.lineTo(bx + w, by + h - r);
  ctx.quadraticCurveTo(bx + w, by + h, bx + w - r, by + h);
  ctx.lineTo(bx + w / 2 + 5, by + h);
  ctx.lineTo(bx + w / 2, by + h + 8); // Pointer
  ctx.lineTo(bx + w / 2 - 5, by + h);
  ctx.lineTo(bx + r, by + h);
  ctx.quadraticCurveTo(bx, by + h, bx, by + h - r);
  ctx.lineTo(bx, by + r);
  ctx.quadraticCurveTo(bx, by, bx + r, by);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  
  // Text
  ctx.fillStyle = "#e6edf3";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(displayContent, bx + w / 2, by + h / 2);
  
  ctx.restore();
}

// ── Agent cards ───────────────────────────────────────────────────
function renderAgents(agents) {
  const list = document.getElementById('agents-list');
  list.innerHTML = '';
  for (const a of agents) {
    const color = agentColor(a.name);
    
    // Count summary of inventory items
    const invCounts = {};
    a.inventory.forEach(item => {
      invCounts[item] = (invCounts[item] || 0) + 1;
    });
    
    const invSummary = Object.entries(invCounts).map(([item, count]) => {
      return `<span class="inv-badge">${item} x${count}</span>`;
    }).join(' ');

    const inv = a.inventory.length ? invSummary : '<span style="color:var(--muted);font-size:.65rem">empty</span>';
    const money = `<span class="money-badge">💰 ${a.money ?? 0} gold</span>`;

    const card = document.createElement('div');
    card.className = 'agent-card' + (a.alive ? '' : ' dead');
    
    // Determine color class for path
    let pathStyle = 'color:var(--muted)';
    if (a.path === 'Performer') pathStyle = 'color:var(--yellow)';
    if (a.path === 'Scholar')   pathStyle = 'color:var(--blue)';
    if (a.path === 'Commoner')  pathStyle = 'color:var(--green)';
    if (a.path === 'Leader')    pathStyle = 'color:var(--red)';

    card.innerHTML = `
      <div class="agent-header">
        <div class="agent-dot" style="background:${color}"></div>
        <span class="agent-name" style="color:${color}">${a.name}</span>
        <span style="font-size:0.6rem; ${pathStyle}; margin-left:auto; border:1px solid; border-radius:4px; padding:0 4px;">${a.path.toUpperCase()}</span>
        ${!a.alive ? '<span style="color:var(--red);font-size:.65rem">PERISHED</span>' : ''}
      </div>
      <div class="agent-loc">📍 ${a.location.replace('_',' ')} &nbsp; ${inv} ${money}</div>
      <div class="agent-thought">${a.last_thought || '…'}</div>
      <div class="stat-row">
        ${statBar('Hunger',    a.hunger,    'hunger')}
        ${statBar('Energy',    a.energy,    'energy')}
        ${statBar('Social',    a.community, 'community')}
        ${statBar('Money',     a.money ?? 0, 'money', 20)}
      </div>
      <div class="trait-row">
        <span class="trait-badge" title="Greed">G:${a.greed.toFixed(1)}</span>
        <span class="trait-badge" title="Sociability">S:${a.sociability.toFixed(1)}</span>
        <span class="trait-badge" title="Curiosity">C:${a.curiosity.toFixed(1)}</span>
        <span class="trait-badge" title="Empathy" style="border-color:var(--green)">E:${a.empathy.toFixed(1)}</span>
        <span class="trait-badge" title="Assertiveness" style="border-color:var(--red)">A:${a.assertiveness.toFixed(1)}</span>
      </div>`;
    list.appendChild(card);
  }
}

function statBar(label, val, cls, max = 10) {
  const pct = Math.min(100, (val / max) * 100);
  return `<div class="stat">
    <span class="stat-label">${label}</span>
    <div class="stat-bar"><div class="stat-fill ${cls}" style="width:${pct}%"></div></div>
    <span class="stat-num">${val}/${max}</span>
  </div>`;
}

// ── Chronicle ─────────────────────────────────────────────────────
let lastStateTick = -1;

function renderChronicle(entries, tick) {
  if (tick === lastStateTick) return;
  lastStateTick = tick;

  const log = document.getElementById('chronicle-log');
  log.innerHTML = '';
  for (const e of [...entries].reverse()) {
    const div = document.createElement('div');
    div.className = 'c-entry' + ((e.entry.includes('💰') || e.entry.includes('📢')) ? ' pay' : '');
    div.innerHTML = `<span class="c-tick">[${e.tick}]</span>${e.entry}`;
    log.appendChild(div);
  }
}

// ── State update ──────────────────────────────────────────────────
function applyState(s) {
  document.getElementById('tick-display').textContent  = `Tick: ${s.tick}`;
  document.getElementById('berry-display').textContent = `🫐 ${s.berry_count}`;
  const totalMoney = s.agents.reduce((sum, a) => sum + (a.money ?? 0), 0);
  document.getElementById('gold-display').textContent = `💰 ${totalMoney}`;
  
  // Tick down active bubbles
  activeBubbles.forEach(b => b.ticks--);
  activeBubbles = activeBubbles.filter(b => b.ticks > 0);
  
  // Check for new talk events in chronicle
  const currentTickTalks = s.chronicle.filter(e => e.tick === s.tick && e.entry.includes('💬'));
  currentTickTalks.forEach(t => {
     // Format in src/skills.py: 💬 [Agent] → [Target]: "[Message]"
     const talkRegex = /💬\s+(.*?)\s+→\s+(.*?):\s+"(.*)"/;
     const match = t.entry.match(talkRegex);
     if (match) {
        const [_, name, target, rawMsg] = match;
        const msg = rawMsg.trim();
        // Upsert bubble
        const existing = activeBubbles.find(b => b.name === name);
        if (existing) {
           existing.msg = msg;
           existing.ticks = 15; // Last for 15 simulation ticks
        } else {
           activeBubbles.push({ name: name, msg: msg, ticks: 15 });
        }
     }
  });

  drawWorld(s);
  renderAgents(s.agents);
  renderChronicle(s.chronicle, s.tick);
}

// ── WebSocket ─────────────────────────────────────────────────────
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws    = new WebSocket(`${proto}//${location.host}/ws`);
  const dot   = document.getElementById('conn-dot');

  ws.onopen    = () => dot.className = 'live';
  ws.onmessage = e => { try { applyState(JSON.parse(e.data)); } catch {} };
  ws.onclose   = () => { dot.className = ''; setTimeout(connect, 3000); };
  ws.onerror   = () => ws.close();
}

// Initial load + connect
fetch('/state').then(r => r.json()).then(applyState).catch(console.error);
connect();

// ── Character creation ────────────────────────────────────────────
function updateVal(key, raw) {
  const v = (raw / 100).toFixed(1);
  document.getElementById('val' + key.charAt(0).toUpperCase() + key.slice(1)).textContent = v;
}

async function createAgent() {
  const name = document.getElementById('agentName').value.trim();
  if (!name) { alert('Please enter a name.'); return; }

  const greed       = document.getElementById('sliderGreed').value / 100;
  const sociability = document.getElementById('sliderSocial').value / 100;
  const curiosity   = document.getElementById('sliderCurio').value / 100;
  const empathy     = document.getElementById('sliderEmpathy').value / 100;
  const assertiveness = document.getElementById('sliderAssert').value / 100;

  const btn = document.getElementById('createBtn');
  btn.disabled    = true;
  btn.textContent = 'BIRTHING…';

  try {
    const resp   = await fetch('/agents', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ name, greed, sociability, curiosity, empathy, assertiveness }),
    });
    const result = await resp.json();
    document.getElementById('agentName').value = '';
    btn.textContent = `✨ ${result.name} IS ALIVE!`;
    setTimeout(() => { btn.textContent = 'BIRTH AGENT'; btn.disabled = false; }, 2500);
    fetch('/state').then(r => r.json()).then(applyState);
  } catch {
    btn.textContent = 'ERROR — RETRY';
    btn.disabled    = false;
  }
}

async function resetSimulation() {
  if (!confirm('🚨 This will erase all agents, memories, and chronicles. Are you sure?')) return;

  const btn = document.getElementById('resetBtn');
  btn.disabled    = true;
  btn.textContent = 'RESETTING…';

  try {
    const resp = await fetch('/reset', { method: 'POST' });
    const result = await resp.json();
    btn.textContent = '✨ RESET COMPLETE!';
    setTimeout(() => { btn.textContent = 'RESET ALL'; btn.disabled = false; }, 2500);
    fetch('/state').then(r => r.json()).then(applyState);
  } catch {
    btn.textContent = 'ERROR — RETRY';
    btn.disabled    = false;
  }
}
